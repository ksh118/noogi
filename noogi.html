<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이브 투표 — 표시 화면</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:#0B0B15;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  transition:background 0.8s;
}

.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity .8s;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;}
.orb-1{width:500px;height:500px;background:#7C3AED;top:-100px;left:-100px;animation:f1 12s infinite alternate ease-in-out;}
.orb-2{width:400px;height:400px;background:#3B82F6;bottom:-80px;right:-80px;animation:f2 10s infinite alternate ease-in-out;}
.orb-3{width:300px;height:300px;background:#EC4899;top:50%;right:20%;animation:f3 14s infinite alternate ease-in-out;}
@keyframes f1{0%{transform:translate(0,0)}100%{transform:translate(60px,40px)}}
@keyframes f2{0%{transform:translate(0,0)}100%{transform:translate(-40px,60px)}}
@keyframes f3{0%{transform:translate(0,0)}100%{transform:translate(30px,-50px)}}

.inactive{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,.9);transition:opacity .4s;}
.inactive.hidden{opacity:0;pointer-events:none;}
.inactive-icon{font-size:52px;margin-bottom:12px;opacity:.35;}
.inactive-text{font-size:20px;font-weight:700;color:rgba(255,255,255,.35);}
.inactive-sub{font-size:12px;color:rgba(255,255,255,.2);margin-top:6px;}

.content{
  position:relative;z-index:5;
  width:100%;max-width:960px;
  padding:40px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  opacity:0;transition:opacity .5s;
}
.content.visible{opacity:1;}

.header-row{
  width:100%;display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  text-align:center;
  margin-bottom:24px;
  transition:all .4s;
}
.header-row.layout-right{
  flex-direction:row;
  justify-content:center;
  align-items:center;
  text-align:left;
}
.header-texts{line-height:1.15;}
.disp-title{
  font-weight:900;
  text-shadow:0 4px 30px rgba(0,0,0,.5);
  transition:all .4s;
  word-break:keep-all;
}
.disp-sub{font-weight:500;transition:all .4s;}

/* TIMER */
.timer-block{
  display:flex;align-items:center;gap:8px;
  transition:all .4s;
  flex-shrink:0;
}
.timer-block.hidden-t{display:none;}
.t-grp{display:flex;flex-direction:column;align-items:center;gap:4px;}
.t-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;}
.t-box{
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.12);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-1px;
  position:relative;overflow:hidden;transition:all .3s;
}
.t-box::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%);}
.t-box.urgent{border-color:#EF4444;box-shadow:0 0 28px rgba(239,68,68,.4);color:#EF4444;animation:tsh .28s infinite;}
.t-box.warning{border-color:#F59E0B;box-shadow:0 0 18px rgba(245,158,11,.3);color:#F59E0B;}
.t-box.running{border-color:rgba(124,58,237,.6);box-shadow:0 0 18px rgba(124,58,237,.3);}
@keyframes tsh{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
.t-sep{font-weight:900;color:rgba(255,255,255,.3);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ITEMS */
.items-wrap{width:100%;display:flex;flex-direction:column;}
.vote-item{
  position:relative;
  border-radius:16px;padding:16px 20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  transition:all .4s;
}
.vote-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);pointer-events:none;}
.item-bg-fill{position:absolute;top:0;left:0;bottom:0;border-radius:16px;transition:width .8s cubic-bezier(.34,1.56,.64,1);opacity:.18;}
.item-content{position:relative;z-index:2;display:flex;align-items:center;gap:14px;}
.item-rank{
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;flex-shrink:0;
  /* Dark semi-transparent so it always reads against any item color */
  background:rgba(0,0,0,.30)!important;
  color:#fff!important;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.15);
}
.item-info{flex:1;}
.item-label{font-weight:700;}
.item-desc{color:rgba(255,255,255,.5);}
.item-right{text-align:right;flex-shrink:0;}
.item-count{font-weight:900;letter-spacing:-1px;}
.item-pct{color:rgba(255,255,255,.5);}
.item-bar-wrap{position:relative;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.item-bar{position:absolute;top:0;left:0;bottom:0;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.vote-item.lead{border-color:rgba(255,255,255,.2);}
@keyframes flash{0%{background:rgba(255,255,255,.14)}100%{background:inherit}}
.vote-item.updated{animation:flash .5s ease-out;}

.wm{position:fixed;bottom:12px;right:12px;font-size:10px;color:rgba(255,255,255,.12);z-index:10;letter-spacing:.1em;}
</style>
</head>
<body>

<div class="bg-orbs" id="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="inactive" id="inactive">
  <div class="inactive-icon">⏳</div>
  <div class="inactive-text">진행 중이 아닙니다</div>
  <div class="inactive-sub">관리자가 투표를 시작하면 표시됩니다</div>
</div>

<div class="content" id="content">
  <div class="header-row" id="header-row">
    <div class="header-texts">
      <div class="disp-title" id="d-title">🎯 라이브 투표</div>
      <div class="disp-sub" id="d-sub" style="margin-top:6px">지금 바로 투표하세요!</div>
    </div>
    <div class="timer-block" id="timer-block">
      <div class="t-grp"><div class="t-lbl">분</div><div class="t-box" id="t-min">00</div></div>
      <div class="t-sep" id="t-sep">:</div>
      <div class="t-grp"><div class="t-lbl">초</div><div class="t-box" id="t-sec">00</div></div>
    </div>
  </div>
  <div class="items-wrap" id="items-wrap"></div>
</div>

<div class="wm">LIVE VOTE</div>

<script>
const SURL='https://ayizwqajaoqmjyhkcgcb.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aXp3cWFqYW9xbWp5aGtjZ2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg5NzUsImV4cCI6MjA5MjE4NDk3NX0.SbvUfjmBL0eFO3Bv4F3YEw12qfG65iIMPbWy919T3fo';
const{createClient}=supabase;
const db=createClient(SURL,SKEY);

let S={},items=[],localTimer=0,tInt=null,lastCounts={};

// ── Helpers ────────────────────────────────────────────────────
function hexToRgb(hex){
  if(!hex||hex.length<7)return{r:11,g:11,b:21};
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}
function getLuminance(r,g,b){
  const a=[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
// Compute readable text color for item boxes given bg color and opacity
function itemTextColor(bgColor,opacity,overrideColor){
  if(overrideColor)return overrideColor;
  const bg=hexToRgb(bgColor||'#0B0B15');
  // item box = rgba(255,255,255,opacity) over bg
  const br=Math.round(bg.r*(1-opacity)+255*opacity);
  const bg2=Math.round(bg.g*(1-opacity)+255*opacity);
  const bb=Math.round(bg.b*(1-opacity)+255*opacity);
  const lum=getLuminance(br,bg2,bb);
  return lum>0.35?'#1A1917':'#FFFFFF';
}

// ── Load ───────────────────────────────────────────────────────
async function loadAll(){
  const[{data:s},{data:i}]=await Promise.all([
    db.from('vote_settings').select('*').eq('id','00000000-0000-0000-0000-000000000001').single(),
    db.from('vote_items').select('*').order('sort_position')
  ]);
  if(s){S=s;applyS();}
  if(i){items=i;renderItems();}
}

function applyS(){
  const body=document.body;
  const orbs=document.getElementById('bg-orbs');
  const inactive=document.getElementById('inactive');
  const content=document.getElementById('content');
  const hRow=document.getElementById('header-row');
  const tb=document.getElementById('timer-block');
  const titleEl=document.getElementById('d-title');
  const subEl=document.getElementById('d-sub');

  body.style.background=S.bg_color||'#0B0B15';
  orbs.style.opacity=S.bg_effect!==false?'1':'0';

  inactive.classList.toggle('hidden',!!S.is_active);
  content.classList.toggle('visible',!!S.is_active);

  const scale=(S.display_scale||100)/100;
  content.style.transform=`scale(${scale})`;
  content.style.transformOrigin='center center';

  titleEl.textContent=S.title||'🎯 라이브 투표';
  titleEl.style.color=S.title_color||'#FFFFFF';
  titleEl.style.fontSize=(S.title_size||48)+'px';
  subEl.textContent=S.subtitle||'지금 바로 투표하세요!';
  subEl.style.color=S.subtitle_color||'#A78BFA';
  subEl.style.fontSize=(S.subtitle_size||24)+'px';

  const tl=S.timer_layout||'below';
  hRow.className='header-row'+(tl==='right'?' layout-right':'');

  // Timer size from DB or fallback
  const tsz=S.timer_size||46;
  document.querySelectorAll('.t-box').forEach(b=>{
    b.style.width=tsz+'px';
    b.style.height=(tsz+8)+'px';
    b.style.fontSize=(tsz*.6)+'px';
    b.style.borderRadius=(tsz*.25)+'px';
  });
  const sep=document.getElementById('t-sep');
  if(sep){sep.style.fontSize=(tsz*.55)+'px';sep.style.marginBottom=(tsz*.3)+'px';}

  const tv=S.timer_visible!==false;
  tb.classList.toggle('hidden-t',!tv);

  localTimer=S.timer_remaining??0;
  renderTimer(localTimer);
  clearInterval(tInt);tInt=null;
  if(S.timer_running&&localTimer>0&&tv){
    tInt=setInterval(()=>{
      if(localTimer>0){localTimer--;renderTimer(localTimer);}
      else clearInterval(tInt);
    },1000);
  }
  if(sep)sep.style.animationPlayState=S.timer_running?'running':'paused';

  renderItems();
}

function renderTimer(secs){
  const m=Math.floor(secs/60),s=secs%60;
  document.getElementById('t-min').textContent=String(m).padStart(2,'0');
  document.getElementById('t-sec').textContent=String(s).padStart(2,'0');
  document.querySelectorAll('.t-box').forEach(b=>{
    b.classList.remove('urgent','warning','running');
    if(secs<=10)b.classList.add('urgent');
    else if(secs<=30)b.classList.add('warning');
    else if(S.timer_running)b.classList.add('running');
  });
}

function getSorted(){
  const a=[...items];
  if(S.sort_order==='desc')a.sort((x,y)=>y.vote_count-x.vote_count);
  else if(S.sort_order==='asc')a.sort((x,y)=>x.vote_count-y.vote_count);
  else a.sort((x,y)=>x.sort_position-y.sort_position);
  return a;
}

function renderItems(){
  const wrap=document.getElementById('items-wrap');
  const sorted=getSorted();
  const total=sorted.reduce((a,b)=>a+b.vote_count,0);
  const showNums=S.show_numbers!==false;
  const scale=(S.display_scale||100)/100;
  const opacity=(S.item_opacity??30)/100;
  const bgColor=S.bg_color||'#0B0B15';
  // Use admin-set item_text_color or auto-compute based on opacity
  const hasOverride=!!S.item_text_color;
  const autoTxtColor=itemTextColor(bgColor,opacity,hasOverride?S.item_text_color:null);

  wrap.style.gap=Math.round(10*scale)+'px';

  if(!sorted.length){
    wrap.innerHTML='<div style="text-align:center;color:rgba(255,255,255,.25);padding:40px;font-size:16px">투표 항목이 없습니다</div>';
    return;
  }
  const maxC=Math.max(...sorted.map(i=>i.vote_count),1);

  sorted.forEach((item,idx)=>{
    const pct=total>0?Math.round(item.vote_count/total*100):0;
    const barPct=Math.round(item.vote_count/maxC*100);
    const isLead=idx===0&&item.vote_count>0;
    const wasUpdated=lastCounts[item.id]!==undefined&&lastCounts[item.id]!==item.vote_count;

    let el=document.getElementById('item-'+item.id);
    const itemBg=`rgba(255,255,255,${opacity})`;
    const rankSize=Math.round(32*scale);
    const barH=Math.round(5*scale);
    const pad=Math.round(14*scale);

    if(!el){
      el=document.createElement('div');
      el.id='item-'+item.id;
      el.className='vote-item';
      wrap.appendChild(el);
    }

    el.style.background=itemBg;
    el.style.padding=pad+'px '+Math.round(18*scale)+'px';

    const existContent=document.getElementById('ic-'+item.id);

    if(!existContent){
      el.innerHTML=`
        <div class="item-bg-fill" id="ibf-${item.id}" style="background:${item.color};width:${barPct}%"></div>
        <div class="item-content" id="ic-${item.id}">
          ${showNums?`<div class="item-rank" id="irk-${item.id}" style="width:${rankSize}px;height:${rankSize}px;font-size:${Math.round(13*scale)}px;">${idx+1}</div>`:''}
          <div class="item-info">
            <div class="item-label" id="ilbl-${item.id}" style="font-size:${Math.round(16*scale)}px;color:${autoTxtColor}">${item.label}</div>
            ${item.description?`<div class="item-desc" style="font-size:${Math.round(11*scale)}px">${item.description}</div>`:''}
          </div>
          <div class="item-right">
            <div class="item-count" id="icnt-${item.id}" style="font-size:${Math.round(30*scale)}px;color:${item.color}">${item.vote_count}</div>
            <div class="item-pct" id="ipct-${item.id}" style="font-size:${Math.round(12*scale)}px">${pct}%</div>
          </div>
        </div>
        <div class="item-bar-wrap" style="margin-top:${Math.round(9*scale)}px;height:${barH}px">
          <div class="item-bar" id="ibar-${item.id}" style="background:${item.color};width:${barPct}%"></div>
        </div>`;
    }else{
      const cnt=document.getElementById('icnt-'+item.id);
      const pctEl=document.getElementById('ipct-'+item.id);
      const bar=document.getElementById('ibar-'+item.id);
      const rnk=document.getElementById('irk-'+item.id);
      const bgf=document.getElementById('ibf-'+item.id);
      const lbl=document.getElementById('ilbl-'+item.id);
      if(cnt){cnt.textContent=item.vote_count;cnt.style.color=item.color;cnt.style.fontSize=Math.round(30*scale)+'px';}
      if(pctEl)pctEl.textContent=pct+'%';
      if(bar){bar.style.width=barPct+'%';bar.style.background=item.color;}
      if(rnk){rnk.textContent=idx+1;rnk.style.width=rankSize+'px';rnk.style.height=rankSize+'px';rnk.style.fontSize=Math.round(13*scale)+'px';}
      if(bgf){bgf.style.background=item.color;bgf.style.width=barPct+'%';}
      if(lbl){lbl.style.color=autoTxtColor;lbl.style.fontSize=Math.round(16*scale)+'px';}
    }

    el.classList.toggle('lead',isLead);
    if(wasUpdated){el.classList.add('updated');setTimeout(()=>el.classList.remove('updated'),500);}
    lastCounts[item.id]=item.vote_count;
    wrap.appendChild(el);
  });

  // Remove deleted items
  const ids=sorted.map(i=>'item-'+i.id);
  wrap.querySelectorAll('.vote-item').forEach(el=>{if(!ids.includes(el.id))el.remove();});
}

// ── Realtime — comprehensive subscription ─────────────────────
function setupRT(){
  db.channel('display-rt-v4')
    .on('postgres_changes',{event:'*',schema:'public',table:'vote_settings'},payload=>{
      S=payload.new;
      applyS();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'vote_items'},async()=>{
      const{data}=await db.from('vote_items').select('*').order('sort_position');
      if(data){items=data;renderItems();}
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'vote_items'},payload=>{
      const updated=payload.new;
      const idx=items.findIndex(i=>i.id===updated.id);
      if(idx>=0)items[idx]={...items[idx],...updated};
      else items.push(updated);
      renderItems();
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'vote_items'},payload=>{
      items=items.filter(i=>i.id!==payload.old.id);
      renderItems();
    })
    .subscribe();
}

loadAll().then(setupRT);
</script>
</body>
</html>
