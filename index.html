<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이브 투표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0D0D18;--bg2:#141422;--bg3:#1C1C30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#F0F0FF;--text2:#9090B0;
  --accent:#7C3AED;--accent2:#A855F7;
  --green:#10B981;--red:#EF4444;--yellow:#F59E0B;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 10%,rgba(124,58,237,.09) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(59,130,246,.06) 0%,transparent 50%);}
.wrap{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 16px 100px;}

.header{text-align:center;padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.h-title{font-size:24px;font-weight:900;letter-spacing:-.5px;line-height:1.2;margin-bottom:5px;}
.h-sub{font-size:13px;font-weight:500;}

.status-banner{border-radius:12px;padding:16px 18px;text-align:center;margin-bottom:18px;transition:all .3s;}
.s-inactive{background:rgba(255,255,255,.04);border:1px solid var(--border2);}
.s-active{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);}
.s-icon{font-size:26px;margin-bottom:6px;}
.s-text{font-size:15px;font-weight:700;}
.s-sub{font-size:12px;color:var(--text2);margin-top:3px;}

.timer-wrap{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:20px;}
.t-grp{display:flex;flex-direction:column;align-items:center;gap:3px;}
.t-lbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;}
.t-box{width:62px;height:66px;background:var(--bg3);border:2px solid var(--border2);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;transition:border-color .3s,color .3s;}
.t-box.running{border-color:var(--accent2);color:var(--accent2);}
.t-box.warning{border-color:var(--yellow);color:var(--yellow);}
.t-box.urgent{border-color:var(--red);color:var(--red);animation:shake .25s infinite;}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-2px)}70%{transform:translateX(2px)}}
.t-sep{font-size:24px;font-weight:900;color:var(--text2);padding-bottom:14px;animation:sep-b 1s infinite;}
@keyframes sep-b{0%,100%{opacity:1}50%{opacity:.3}}

.free-badge{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;margin-bottom:18px;}
.fb-l{font-size:13.5px;font-weight:600;}
.fb-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.pips{display:flex;gap:4px;flex-wrap:wrap;max-width:140px;justify-content:flex-end;}
.pip{width:10px;height:10px;border-radius:3px;background:var(--border2);transition:background .3s;}
.pip.used{background:var(--accent2);box-shadow:0 0 5px rgba(168,85,247,.4);}

.tab-bar{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:18px;}
.tab-btn{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.tab-btn.active{background:var(--accent);color:#fff;}

.items-list{display:flex;flex-direction:column;gap:9px;}
.vote-card{background:var(--bg2);border:2px solid var(--border);border-radius:15px;padding:14px 16px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
.vote-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.vote-card.sel{transform:translateY(-2px);}
.card-top{display:flex;align-items:center;gap:11px;margin-bottom:9px;}
.card-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.card-lbl{font-size:15px;font-weight:700;}
.card-dsc{font-size:11px;color:var(--text2);margin-top:1px;}
.card-cnt{text-align:right;}
.card-cnt-n{font-size:21px;font-weight:900;}
.card-cnt-p{font-size:10px;color:var(--text2);}
.card-bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.card-bar{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.chk-ring{position:absolute;top:11px;right:11px;width:21px;height:21px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s;}
.vote-card.sel .chk-ring{background:var(--accent2);border-color:var(--accent2);color:#fff;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
.vote-card.popped{animation:pop .35s ease-out;}

.disabled-overlay{text-align:center;padding:44px 18px;color:var(--text2);}
.d-icon{font-size:36px;margin-bottom:10px;}
.d-text{font-size:15px;font-weight:700;}
.d-sub{font-size:12px;margin-top:3px;}

.result-item{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:9px;}

.vote-btn-wrap{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:11px 16px 18px;background:linear-gradient(0deg,var(--bg) 55%,transparent);}
.vote-btn{width:100%;max-width:540px;margin:0 auto;display:block;padding:16px;border-radius:14px;border:none;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .2s;}
.vote-btn.ready{background:var(--accent);color:#fff;box-shadow:0 6px 22px rgba(124,58,237,.4);}
.vote-btn.ready:hover{background:var(--accent2);transform:translateY(-1px);}
.vote-btn.ready:active{transform:translateY(1px);}
.vote-btn.off{background:var(--bg2);color:var(--text2);cursor:not-allowed;border:1px solid var(--border2);}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(28,28,50,.95);backdrop-filter:blur(10px);border:1px solid var(--border2);border-radius:9px;padding:10px 16px;font-size:12.5px;font-weight:600;z-index:200;opacity:0;transition:all .22s;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="header">
    <div class="h-title" id="h-title">🎯 라이브 투표</div>
    <div class="h-sub" id="h-sub" style="color:#A78BFA">잠시만 기다려주세요...</div>
  </div>

  <div class="status-banner s-inactive" id="status-banner">
    <div class="s-icon">⏳</div>
    <div class="s-text">투표 준비 중</div>
    <div class="s-sub">관리자가 시작하면 나타납니다</div>
  </div>

  <div class="timer-wrap" id="timer-wrap" style="display:none">
    <div class="t-grp"><div class="t-lbl">분</div><div class="t-box" id="v-min">00</div></div>
    <div class="t-sep">:</div>
    <div class="t-grp"><div class="t-lbl">초</div><div class="t-box" id="v-sec">00</div></div>
  </div>

  <div class="free-badge" id="free-badge" style="display:none">
    <div>
      <div class="fb-l" id="fb-label">남은 투표</div>
      <div class="fb-sub" id="fb-sub">–</div>
    </div>
    <div class="pips" id="pips"></div>
  </div>

  <div class="tab-bar" id="tab-bar" style="display:none">
    <button class="tab-btn active" onclick="switchTab('vote')">🗳 투표</button>
    <button class="tab-btn" onclick="switchTab('results')">📊 현황</button>
  </div>

  <div id="tab-vote"><div class="items-list" id="items-list"></div></div>
  <div id="tab-results" style="display:none"><div id="results-list"></div></div>
</div>

<div class="vote-btn-wrap" id="vbw" style="display:none">
  <button class="vote-btn off" id="vote-btn" onclick="castVote()">항목을 선택해주세요</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SURL='https://ayizwqajaoqmjyhkcgcb.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aXp3cWFqYW9xbWp5aGtjZ2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg5NzUsImV4cCI6MjA5MjE4NDk3NX0.SbvUfjmBL0eFO3Bv4F3YEw12qfG65iIMPbWy919T3fo';
const{createClient}=supabase;
const db=createClient(SURL,SKEY);

let S={},items=[],selId=null,localTimer=0,tInt=null,curTab='vote',usedMap={};
const VID=getVID();

function getVID(){let id=localStorage.getItem('vvid3');if(!id){id='v_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);localStorage.setItem('vvid3',id);}return id;}

function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast on '+(type==='success'?'success':type==='error'?'error':'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),3000);
}

async function loadAll(){
  const[{data:s},{data:i}]=await Promise.all([
    db.from('vote_settings').select('*').eq('id','00000000-0000-0000-0000-000000000001').single(),
    db.from('vote_items').select('*').order('sort_position')
  ]);
  if(s)S=s;if(i)items=i;
  const{data:usage}=await db.from('free_vote_usage').select('*').eq('voter_id',VID);
  usedMap={};if(usage)usage.forEach(u=>usedMap[u.item_id]=u.votes_used);
  render();
}

function getMax(){return S.free_votes_per_user??3;}
function getRemaining(){const m=getMax();if(m===0)return 0;if(m>=9999)return Infinity;return Math.max(0,m-Object.values(usedMap).reduce((a,b)=>a+b,0));}
function isDisabled(){return getMax()===0;}
function isUnlimited(){return getMax()>=9999;}

function getSorted(){
  const a=[...items];
  if(S.sort_order==='desc')a.sort((x,y)=>y.vote_count-x.vote_count);
  else if(S.sort_order==='asc')a.sort((x,y)=>x.vote_count-y.vote_count);
  else a.sort((x,y)=>x.sort_position-y.sort_position);
  return a;
}

function render(){
  // Header
  const ht=document.getElementById('h-title'),hs=document.getElementById('h-sub');
  ht.textContent=S.title||'🎯 라이브 투표';ht.style.color=S.title_color||'#F0F0FF';
  hs.textContent=S.subtitle||'지금 바로 투표하세요!';hs.style.color=S.subtitle_color||'#A78BFA';

  const banner=document.getElementById('status-banner');
  const tw=document.getElementById('timer-wrap');
  const fb=document.getElementById('free-badge');
  const tabBar=document.getElementById('tab-bar');
  const vbw=document.getElementById('vbw');

  if(S.is_active){
    banner.className='status-banner s-active';
    banner.innerHTML='<div class="s-icon">🗳️</div><div class="s-text">투표 진행 중!</div><div class="s-sub">아래에서 선택하고 투표하세요</div>';
    tw.style.display=S.timer_visible!==false?'flex':'none';
    fb.style.display='flex';tabBar.style.display='flex';
    if(curTab==='vote')vbw.style.display='block';
    renderFreeBadge();
  }else{
    banner.className='status-banner s-inactive';
    banner.innerHTML='<div class="s-icon">⏳</div><div class="s-text">투표 준비 중</div><div class="s-sub">관리자가 시작하면 나타납니다</div>';
    tw.style.display='none';fb.style.display='none';tabBar.style.display='none';vbw.style.display='none';
  }

  // Timer
  localTimer=S.timer_remaining??0;
  clearInterval(tInt);tInt=null;renderTimer(localTimer);
  if(S.timer_running&&localTimer>0&&S.is_active&&S.timer_visible!==false){
    tInt=setInterval(()=>{if(localTimer>0){localTimer--;renderTimer(localTimer);}else clearInterval(tInt);},1000);
  }

  renderItemsList();renderResults();updateBtn();
}

function renderFreeBadge(){
  const m=getMax();const rem=getRemaining();
  const lbl=document.getElementById('fb-label');const sub=document.getElementById('fb-sub');const pips=document.getElementById('pips');
  if(isDisabled()){lbl.textContent='무료 투표 불가';sub.textContent='이 투표는 무료 투표를 지원하지 않습니다';pips.innerHTML='';return;}
  if(isUnlimited()){lbl.innerHTML='남은 투표 <span style="background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700;color:var(--accent2)">♾️ 무제한</span>';sub.textContent='자유롭게 투표하세요';pips.innerHTML='';return;}
  lbl.textContent=`남은 투표: ${rem} / ${m}표`;sub.textContent=rem>0?'원하는 항목에 투표하세요':'투표 횟수를 모두 사용했습니다';
  const disp=Math.min(m,10);const used=m-rem;
  pips.innerHTML=Array.from({length:disp},(_,i)=>`<div class="pip${i<used?' used':''}"></div>`).join('');
}

function renderTimer(secs){
  const m=Math.floor(secs/60),s=secs%60;
  const me=document.getElementById('v-min'),se=document.getElementById('v-sec');
  if(me)me.textContent=String(m).padStart(2,'0');if(se)se.textContent=String(s).padStart(2,'0');
  document.querySelectorAll('.t-box').forEach(b=>{
    b.classList.remove('running','warning','urgent');
    if(secs<=10)b.classList.add('urgent');
    else if(secs<=30)b.classList.add('warning');
    else if(S.timer_running)b.classList.add('running');
  });
}

function renderItemsList(){
  const c=document.getElementById('items-list');
  const sorted=getSorted();const total=sorted.reduce((a,b)=>a+b.vote_count,0);
  const showNums=S.show_numbers!==false;
  if(!sorted.length){c.innerHTML='<div style="text-align:center;color:var(--text2);padding:36px;font-size:14px">항목이 없습니다</div>';return;}
  if(isDisabled()){c.innerHTML='<div class="disabled-overlay"><div class="d-icon">🚫</div><div class="d-text">무료 투표 비활성화</div><div class="d-sub">현재 이 투표에서는 무료 투표를 할 수 없습니다</div></div>';return;}
  c.innerHTML=sorted.map((item,idx)=>{
    const pct=total>0?Math.round(item.vote_count/total*100):0;
    const isSel=selId===item.id;
    return`<div class="vote-card${isSel?' sel':''}" onclick="selectItem('${item.id}')" id="card-${item.id}" style="${isSel?`border-color:${item.color};box-shadow:0 5px 20px ${item.color}22`:''}">
      <div class="chk-ring">${isSel?'✓':''}</div>
      <div class="card-top">
        ${showNums?`<div class="card-num" style="background:${item.color}22;color:${item.color}">${idx+1}</div>`:''}
        <div style="flex:1"><div class="card-lbl">${item.label}</div>${item.description?`<div class="card-dsc">${item.description}</div>`:''}</div>
        <div class="card-cnt"><div class="card-cnt-n" style="color:${item.color}">${item.vote_count}</div><div class="card-cnt-p">${pct}%</div></div>
      </div>
      <div class="card-bar-wrap"><div class="card-bar" style="width:${pct}%;background:${item.color}"></div></div>
    </div>`;
  }).join('');
}

function renderResults(){
  const c=document.getElementById('results-list');
  const sorted=[...items].sort((a,b)=>b.vote_count-a.vote_count);
  const total=sorted.reduce((a,b)=>a+b.vote_count,0);
  if(!sorted.length){c.innerHTML='<div style="text-align:center;color:var(--text2);padding:36px">항목 없음</div>';return;}
  c.innerHTML=sorted.map((item,i)=>{
    const pct=total>0?Math.round(item.vote_count/total*100):0;
    return`<div class="result-item">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:9px">
        <div style="width:26px;height:26px;border-radius:7px;background:${item.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${i+1}</div>
        <div style="flex:1;font-size:14px;font-weight:700">${item.label}</div>
        <div style="text-align:right"><div style="font-size:18px;font-weight:900;color:${item.color}">${item.vote_count}</div><div style="font-size:10px;color:var(--text2)">${pct}%</div></div>
      </div>
      <div style="height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${item.color};transition:width .5s ease;border-radius:2px"></div>
      </div>
    </div>`;
  }).join('');
}

function selectItem(id){
  if(isDisabled())return;
  selId=selId===id?null:id;renderItemsList();updateBtn();
}

function updateBtn(){
  const btn=document.getElementById('vote-btn');if(!btn)return;
  if(!S.is_active){btn.textContent='투표가 진행 중이 아닙니다';btn.className='vote-btn off';return;}
  if(isDisabled()){btn.textContent='무료 투표 비활성화됨';btn.className='vote-btn off';return;}
  if(!selId){btn.textContent='항목을 선택해주세요';btn.className='vote-btn off';return;}
  const rem=getRemaining();
  if(!isUnlimited()&&rem<=0){btn.textContent='투표 횟수를 모두 사용했습니다';btn.className='vote-btn off';return;}
  const item=items.find(i=>i.id===selId);
  const remText=isUnlimited()?'무제한':`${rem}표 남음`;
  btn.textContent=`🗳 "${item?.label}"에 투표 (${remText})`;btn.className='vote-btn ready';
}

async function castVote(){
  if(!selId||!S.is_active||isDisabled())return;
  const rem=getRemaining();
  if(!isUnlimited()&&rem<=0){toast('투표 횟수를 모두 사용했습니다','error');return;}
  const btn=document.getElementById('vote-btn');btn.className='vote-btn off';btn.textContent='투표 중...';
  const{data,error}=await db.rpc('cast_free_vote',{p_voter_id:VID,p_item_id:selId,p_votes:1});
  if(error||!data?.success){toast(data?.message||'투표 실패. 다시 시도해주세요.','error');updateBtn();return;}
  usedMap[selId]=(usedMap[selId]||0)+1;
  const item=items.find(i=>i.id===selId);if(item)item.vote_count++;
  const card=document.getElementById('card-'+selId);if(card){card.classList.add('popped');setTimeout(()=>card.classList.remove('popped'),400);}
  toast('✅ 투표 완료!','success');renderFreeBadge();renderItemsList();renderResults();updateBtn();
}

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['vote','results'][i]===tab));
  document.getElementById('tab-vote').style.display=tab==='vote'?'block':'none';
  document.getElementById('tab-results').style.display=tab==='results'?'block':'none';
  document.getElementById('vbw').style.display=tab==='vote'&&S.is_active?'block':'none';
}

function setupRT(){
  db.channel('vote-rt-v3')
    .on('postgres_changes',{event:'*',schema:'public',table:'vote_settings'},payload=>{S=payload.new;render();})
    .on('postgres_changes',{event:'*',schema:'public',table:'vote_items'},async()=>{
      const{data}=await db.from('vote_items').select('*').order('sort_position');
      if(data){items=data;renderItemsList();renderResults();}
    })
    .subscribe();
}

loadAll().then(setupRT);
</script>
</body>
</html>
