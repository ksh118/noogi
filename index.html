<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이브 투표 참여</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0D0D18;
  --bg2: #141422;
  --bg3: #1C1C30;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #F0F0FF;
  --text2: #8888AA;
  --accent: #7C3AED;
  --accent2: #A855F7;
  --green: #10B981;
  --red: #EF4444;
  --yellow: #F59E0B;
}

body {
  font-family: 'Pretendard', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* BG */
.bg-mesh {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* HEADER */
.site-header {
  text-align: center;
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.site-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  transition: all 0.3s;
}
.site-subtitle {
  font-size: 15px;
  font-weight: 500;
  transition: all 0.3s;
}

/* STATUS BANNER */
.status-banner {
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
  transition: all 0.4s;
}
.status-banner.inactive {
  background: rgba(136,136,170,0.1);
  border: 1px solid rgba(136,136,170,0.2);
}
.status-banner.active {
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.25);
}
.status-icon { font-size: 32px; margin-bottom: 8px; }
.status-text { font-size: 17px; font-weight: 700; }
.status-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* TIMER */
.timer-section {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
}
.t-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.t-label { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }
.t-box {
  background: var(--bg3);
  border: 2px solid var(--border2);
  border-radius: 14px;
  width: 64px; height: 68px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 900;
  font-variant-numeric: tabular-nums;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.t-box.running { border-color: var(--accent2); box-shadow: 0 0 15px rgba(168,85,247,0.25); }
.t-box.warning { border-color: var(--yellow); box-shadow: 0 0 15px rgba(245,158,11,0.25); }
.t-box.urgent { border-color: var(--red); box-shadow: 0 0 15px rgba(239,68,68,0.3); animation: shake 0.3s infinite; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)} }
.t-sep { font-size: 28px; font-weight: 900; color: var(--text2); padding-bottom: 18px; }

/* FREE VOTES BADGE */
.free-badge-wrap { margin-bottom: 20px; }
.free-badge {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.free-badge-left { font-size: 14px; font-weight: 600; }
.free-badge-left span { color: var(--text2); font-weight: 400; font-size: 13px; }
.free-badge-right { display: flex; align-items: center; gap: 6px; }
.vote-pip {
  width: 12px; height: 12px;
  border-radius: 3px;
  background: var(--border2);
  transition: background 0.3s;
}
.vote-pip.used { background: var(--accent2); box-shadow: 0 0 6px rgba(168,85,247,0.4); }

/* TABS */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(124,58,237,0.3); }

/* VOTE ITEMS */
.items-list { display: flex; flex-direction: column; gap: 10px; }

.vote-card {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.vote-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.vote-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.vote-card.selected {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.vote-card.selected::before { opacity: 0.06; }

.card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.card-num {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  flex-shrink: 0;
  transition: all 0.3s;
}
.card-info { flex: 1; }
.card-label { font-size: 16px; font-weight: 700; }
.card-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-count { text-align: right; }
.card-count-num { font-size: 22px; font-weight: 800; }
.card-count-pct { font-size: 11px; color: var(--text2); }

.card-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.card-bar { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

.select-indicator {
  position: absolute;
  top: 12px; right: 12px;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  transition: all 0.25s;
}
.vote-card.selected .select-indicator {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* VOTE BUTTON */
.vote-btn-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(0deg, var(--bg) 60%, transparent 100%);
  z-index: 50;
}
.vote-btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: none;
  font-size: 17px;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.vote-btn.ready { background: var(--accent); color: white; box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
.vote-btn.ready:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,58,237,0.5); }
.vote-btn.ready:active { transform: translateY(0); }
.vote-btn.disabled { background: var(--bg2); color: var(--text2); cursor: not-allowed; border: 1px solid var(--border); }

/* VOTED ANIMATION */
@keyframes voteSuccess {
  0%{transform:scale(1)} 30%{transform:scale(1.05)} 100%{transform:scale(1)}
}
.vote-card.just-voted { animation: voteSuccess 0.4s ease-out; }

/* PAID VOTE FORM */
.paid-form {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}
.paid-form h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.paid-form p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.form-input:focus { outline: none; border-color: var(--accent2); }
select.form-input { appearance: none; cursor: pointer; }
.submit-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.submit-btn:hover { background: var(--accent2); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
.toast.info { border-color: var(--accent2); }

/* RESULTS ONLY VIEW */
.results-section { display: flex; flex-direction: column; gap: 10px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="wrap">
  <div class="site-header">
    <div class="site-title" id="site-title">🎯 라이브 투표</div>
    <div class="site-subtitle" id="site-subtitle">잠시만 기다려주세요...</div>
  </div>

  <!-- STATUS -->
  <div class="status-banner inactive" id="status-banner">
    <div class="status-icon">⏳</div>
    <div class="status-text">진행 중이 아닙니다</div>
    <div class="status-sub">관리자가 투표를 시작하면 여기에 표시됩니다</div>
  </div>

  <!-- TIMER -->
  <div class="timer-section" id="timer-section" style="display:none">
    <div class="t-group">
      <div class="t-label">분</div>
      <div class="t-box" id="v-min">00</div>
    </div>
    <div class="t-sep">:</div>
    <div class="t-group">
      <div class="t-label">초</div>
      <div class="t-box" id="v-sec">00</div>
    </div>
  </div>

  <!-- FREE VOTES BADGE -->
  <div class="free-badge-wrap" id="free-badge-wrap" style="display:none">
    <div class="free-badge">
      <div class="free-badge-left">
        남은 무료 투표 <span id="free-remaining-label">— 표</span>
      </div>
      <div class="free-badge-right" id="vote-pips"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar" id="tab-bar" style="display:none">
    <button class="tab-btn active" onclick="switchTab('free')">🗳 무료 투표</button>
    <button class="tab-btn" onclick="switchTab('paid')">💰 유료 투표</button>
    <button class="tab-btn" onclick="switchTab('results')">📊 실시간 현황</button>
  </div>

  <!-- FREE VOTE TAB -->
  <div id="tab-free">
    <div class="items-list" id="items-list"></div>
  </div>

  <!-- PAID VOTE TAB -->
  <div id="tab-paid" style="display:none">
    <div class="paid-form">
      <h3>💰 유료 투표 신청</h3>
      <p>입금 후 관리자가 확인하면 투표가 반영됩니다. 실명 또는 닉네임으로 신청해주세요.</p>
      <div class="form-group">
        <label class="form-label">이름 / 닉네임</label>
        <input type="text" class="form-input" id="p-name" placeholder="입금자명과 동일하게 입력">
      </div>
      <div class="form-group">
        <label class="form-label">투표할 항목</label>
        <select class="form-input" id="p-item">
          <option value="">항목 선택...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">투표 수량</label>
        <input type="number" class="form-input" id="p-amount" min="1" max="1000" value="1" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">입금 메모 / 참고사항</label>
        <input type="text" class="form-input" id="p-memo" placeholder="입금 메모 또는 주문번호">
      </div>
      <button class="submit-btn" onclick="submitPaidVote()">💰 유료 투표 신청하기</button>
    </div>
  </div>

  <!-- RESULTS TAB -->
  <div id="tab-results" style="display:none">
    <div class="results-section" id="results-list"></div>
  </div>
</div>

<!-- VOTE BUTTON -->
<div class="vote-btn-wrap" id="vote-btn-wrap" style="display:none">
  <button class="vote-btn disabled" id="vote-btn" onclick="castVote()">항목을 선택해주세요</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ayizwqajaoqmjyhkcgcb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aXp3cWFqYW9xbWp5aGtjZ2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg5NzUsImV4cCI6MjA5MjE4NDk3NX0.SbvUfjmBL0eFO3Bv4F3YEw12qfG65iIMPbWy919T3fo';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let settings = {};
let items = [];
let selectedItemId = null;
let localTimer = 0;
let timerInterval = null;
let currentTab = 'free';
let usedVotesMap = {}; // itemId -> used count
const VOTER_ID = getVoterId();

function getVoterId() {
  let id = localStorage.getItem('voter_id');
  if(!id) {
    id = 'voter_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
    localStorage.setItem('voter_id', id);
  }
  return id;
}

// TOAST
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// LOAD
async function loadAll() {
  const [{ data: s }, { data: i }] = await Promise.all([
    db.from('vote_settings').select('*').eq('id','00000000-0000-0000-0000-000000000001').single(),
    db.from('vote_items').select('*').order('sort_position')
  ]);
  if(s) { settings = s; }
  if(i) { items = i; }
  
  // Load usage for this voter
  const { data: usage } = await db.from('free_vote_usage').select('*').eq('voter_id', VOTER_ID);
  if(usage) {
    usedVotesMap = {};
    usage.forEach(u => usedVotesMap[u.item_id] = u.votes_used);
  }
  
  applySettings();
  renderItemsList();
  renderResults();
  updatePaidSelect();
}

function getTotalUsed() {
  return Object.values(usedVotesMap).reduce((a,b) => a+b, 0);
}

function getRemainingVotes() {
  const maxVotes = settings.free_votes_per_user || 3;
  return Math.max(0, maxVotes - getTotalUsed());
}

function applySettings() {
  const titleEl = document.getElementById('site-title');
  const subEl = document.getElementById('site-subtitle');
  titleEl.textContent = settings.title || '🎯 라이브 투표';
  titleEl.style.color = settings.title_color || '#F0F0FF';
  subEl.textContent = settings.subtitle || '투표에 참여하세요!';
  subEl.style.color = settings.subtitle_color || '#A78BFA';
  
  const banner = document.getElementById('status-banner');
  const timerSec = document.getElementById('timer-section');
  const freeBadge = document.getElementById('free-badge-wrap');
  const tabBar = document.getElementById('tab-bar');
  const voteBtnWrap = document.getElementById('vote-btn-wrap');
  
  if(settings.is_active) {
    banner.className = 'status-banner active';
    banner.innerHTML = `<div class="status-icon">🗳️</div><div class="status-text">투표 진행 중!</div><div class="status-sub">아래 항목을 선택하고 투표하세요</div>`;
    timerSec.style.display = 'flex';
    freeBadge.style.display = 'block';
    tabBar.style.display = 'flex';
    if(currentTab === 'free') voteBtnWrap.style.display = 'block';
  } else {
    banner.className = 'status-banner inactive';
    banner.innerHTML = `<div class="status-icon">⏳</div><div class="status-text">진행 중이 아닙니다</div><div class="status-sub">관리자가 투표를 시작하면 여기에 표시됩니다</div>`;
    timerSec.style.display = 'none';
    freeBadge.style.display = 'none';
    tabBar.style.display = 'none';
    voteBtnWrap.style.display = 'none';
  }
  
  // Timer
  localTimer = settings.timer_remaining ?? 0;
  clearInterval(timerInterval);
  renderTimer(localTimer);
  if(settings.timer_running && localTimer > 0) {
    timerInterval = setInterval(() => {
      if(localTimer > 0) { localTimer--; renderTimer(localTimer); }
      else clearInterval(timerInterval);
    }, 1000);
  }
  
  // Free votes badge
  const maxVotes = settings.free_votes_per_user || 3;
  const remaining = getRemainingVotes();
  document.getElementById('free-remaining-label').textContent = `${remaining} / ${maxVotes} 표`;
  
  const pipsEl = document.getElementById('vote-pips');
  pipsEl.innerHTML = Array.from({length:Math.min(maxVotes,10)},(_,i) => 
    `<div class="vote-pip${i < getTotalUsed() ? ' used':''}"></div>`
  ).join('');
}

function renderTimer(secs) {
  const m = Math.floor(secs/60);
  const s = secs%60;
  document.getElementById('v-min').textContent = String(m).padStart(2,'0');
  document.getElementById('v-sec').textContent = String(s).padStart(2,'0');
  const boxes = document.querySelectorAll('.t-box');
  boxes.forEach(b => {
    b.classList.remove('urgent','warning','running');
    if(secs <= 10) b.classList.add('urgent');
    else if(secs <= 30) b.classList.add('warning');
    else if(settings.timer_running) b.classList.add('running');
  });
}

function getSortedItems() {
  const sorted = [...items];
  if(settings.sort_order === 'desc') sorted.sort((a,b) => b.vote_count - a.vote_count);
  else if(settings.sort_order === 'asc') sorted.sort((a,b) => a.vote_count - b.vote_count);
  else sorted.sort((a,b) => a.sort_position - b.sort_position);
  return sorted;
}

function renderItemsList() {
  const container = document.getElementById('items-list');
  const sorted = getSortedItems();
  const total = sorted.reduce((a,b) => a+b.vote_count, 0);
  const showNumbers = settings.show_numbers !== false;
  
  if(!sorted.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px;font-size:15px">투표 항목이 없습니다</div>';
    return;
  }
  
  container.innerHTML = sorted.map((item, idx) => {
    const pct = total > 0 ? Math.round(item.vote_count/total*100) : 0;
    const isSelected = selectedItemId === item.id;
    return `
    <div class="vote-card${isSelected?' selected':''}" onclick="selectItem('${item.id}')" id="card-${item.id}" style="${isSelected?`border-color:${item.color};box-shadow:0 8px 30px ${item.color}22`:''}"
      data-color="${item.color}">
      <div class="select-indicator">${isSelected?'✓':''}</div>
      <div class="card-top">
        ${showNumbers ? `<div class="card-num" style="background:${item.color}22;color:${item.color}">${idx+1}</div>` : ''}
        <div class="card-info">
          <div class="card-label">${item.label}</div>
          ${item.description ? `<div class="card-desc">${item.description}</div>` : ''}
        </div>
        <div class="card-count">
          <div class="card-count-num" style="color:${item.color}">${item.vote_count}</div>
          <div class="card-count-pct">${pct}%</div>
        </div>
      </div>
      <div class="card-bar-wrap">
        <div class="card-bar" style="width:${total>0?pct:0}%;background:${item.color}"></div>
      </div>
    </div>`;
  }).join('');
  
  updateVoteBtn();
}

function renderResults() {
  const container = document.getElementById('results-list');
  const sorted = [...items].sort((a,b) => b.vote_count - a.vote_count);
  const total = sorted.reduce((a,b) => a+b.vote_count, 0);
  
  if(!sorted.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px">항목 없음</div>';
    return;
  }
  
  container.innerHTML = sorted.map((item,i) => {
    const pct = total > 0 ? Math.round(item.vote_count/total*100) : 0;
    return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <div style="width:28px;height:28px;border-radius:8px;background:${item.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0">${i+1}</div>
        <div style="flex:1;font-size:15px;font-weight:700">${item.label}</div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:800;color:${item.color}">${item.vote_count}</div>
          <div style="font-size:11px;color:var(--text2)">${pct}%</div>
        </div>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${item.color};border-radius:3px;transition:width 0.5s ease"></div>
      </div>
    </div>`;
  }).join('');
}

function updatePaidSelect() {
  const sel = document.getElementById('p-item');
  const sorted = getSortedItems();
  sel.innerHTML = '<option value="">항목 선택...</option>' + sorted.map(i => `<option value="${i.id}">${i.label}</option>`).join('');
}

function selectItem(id) {
  selectedItemId = id;
  renderItemsList();
  updateVoteBtn();
}

function updateVoteBtn() {
  const btn = document.getElementById('vote-btn');
  const remaining = getRemainingVotes();
  
  if(!selectedItemId) {
    btn.textContent = '항목을 선택해주세요';
    btn.className = 'vote-btn disabled';
    return;
  }
  if(remaining <= 0) {
    btn.textContent = '무료 투표를 모두 사용했습니다';
    btn.className = 'vote-btn disabled';
    return;
  }
  if(!settings.is_active) {
    btn.textContent = '투표가 진행중이 아닙니다';
    btn.className = 'vote-btn disabled';
    return;
  }
  const item = items.find(i => i.id === selectedItemId);
  btn.textContent = `🗳 "${item?.label}" 에 투표하기 (${remaining}표 남음)`;
  btn.className = 'vote-btn ready';
}

async function castVote() {
  if(!selectedItemId || !settings.is_active) return;
  const remaining = getRemainingVotes();
  if(remaining <= 0) { toast('무료 투표를 모두 사용했습니다', 'error'); return; }
  
  const btn = document.getElementById('vote-btn');
  btn.className = 'vote-btn disabled';
  btn.textContent = '투표 중...';
  
  const { data, error } = await db.rpc('cast_free_vote', {
    p_voter_id: VOTER_ID,
    p_item_id: selectedItemId,
    p_votes: 1
  });
  
  if(error || !data?.success) {
    toast(data?.message || '투표 실패. 다시 시도해주세요.', 'error');
    updateVoteBtn();
    return;
  }
  
  // Update local state
  usedVotesMap[selectedItemId] = (usedVotesMap[selectedItemId] || 0) + 1;
  const item = items.find(i => i.id === selectedItemId);
  if(item) item.vote_count++;
  
  // Flash animation
  const card = document.getElementById('card-' + selectedItemId);
  if(card) card.classList.add('just-voted');
  setTimeout(() => card?.classList.remove('just-voted'), 400);
  
  toast('✅ 투표 완료!', 'success');
  applySettings();
  renderItemsList();
  renderResults();
}

async function submitPaidVote() {
  const name = document.getElementById('p-name').value.trim();
  const itemId = document.getElementById('p-item').value;
  const amount = parseInt(document.getElementById('p-amount').value);
  const memo = document.getElementById('p-memo').value.trim();
  
  if(!name) { toast('이름을 입력해주세요', 'error'); return; }
  if(!itemId) { toast('항목을 선택해주세요', 'error'); return; }
  if(!amount || amount < 1) { toast('올바른 수량을 입력해주세요', 'error'); return; }
  
  const { error } = await db.from('paid_vote_requests').insert({
    voter_name: name,
    item_id: itemId,
    amount: amount,
    payment_proof: memo
  });
  
  if(error) { toast('신청 실패. 다시 시도해주세요.', 'error'); return; }
  
  toast('💰 유료 투표 신청 완료! 관리자 확인 후 반영됩니다.', 'success');
  document.getElementById('p-name').value = '';
  document.getElementById('p-amount').value = '1';
  document.getElementById('p-memo').value = '';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['free','paid','results'][i] === tab);
  });
  document.getElementById('tab-free').style.display = tab==='free'?'block':'none';
  document.getElementById('tab-paid').style.display = tab==='paid'?'block':'none';
  document.getElementById('tab-results').style.display = tab==='results'?'block':'none';
  document.getElementById('vote-btn-wrap').style.display = tab==='free' && settings.is_active ? 'block':'none';
}

function setupRealtime() {
  db.channel('voter-realtime')
    .on('postgres_changes', {event:'*',schema:'public',table:'vote_settings'}, payload => {
      settings = payload.new;
      applySettings();
    })
    .on('postgres_changes', {event:'*',schema:'public',table:'vote_items'}, async () => {
      const { data } = await db.from('vote_items').select('*').order('sort_position');
      if(data) { items = data; renderItemsList(); renderResults(); updatePaidSelect(); }
    })
    .subscribe();
}

loadAll().then(setupRealtime);
</script>
</body>
</html>
